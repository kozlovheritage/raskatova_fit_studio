<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Перенаправление...</title>
    <script>
      // Сохраняем путь, по которому пытались перейти
      const path = window.location.pathname;
      // Перенаправляем на главную страницу с нужным путём
      window.location.replace(`/?redirect=${encodeURIComponent(path)}`);
    </script>
  </head>
  <body></body>
</html>
